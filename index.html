<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>YiZhiQvQ</title>
<meta name="description" content="个人项目导航">
<link rel="icon" type="image/jpeg" href="/icon.jpg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Noto+Sans+SC:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
html { scroll-behavior:smooth; }
body {
  font-family: 'Inter', 'Noto Sans SC', -apple-system, sans-serif;
  background: #06090f;
  color: #e2e8f0;
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
  display: flex; flex-direction: column; align-items: center;
}

/* Background glow */
body::before {
  content: ''; position: fixed; top: -30%; left: 50%; transform: translateX(-50%);
  width: 800px; height: 600px;
  background: radial-gradient(ellipse at center, rgba(59,130,246,0.08), transparent 60%);
  pointer-events: none;
}

header {
  text-align: center; padding: 6rem 2rem 3rem;
  position: relative; z-index: 1;
}
header h1 {
  font-size: clamp(2rem, 5vw, 3.5rem); font-weight: 800;
  letter-spacing: -0.03em; margin-bottom: 0.75rem;
}
.gradient-text {
  background: linear-gradient(135deg, #60a5fa 0%, #a78bfa 50%, #34d399 100%);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  background-clip: text;
}
header p {
  color: #64748b; font-size: 1.05rem;
}

.projects {
  display: flex; flex-wrap: wrap; gap: 1.25rem;
  max-width: 720px; width: 100%; padding: 0 1.5rem 4rem;
  position: relative; z-index: 1;
}
.project-card {
  flex: 1 1 280px;
  background: rgba(255,255,255,0.03);
  border: 1px solid rgba(255,255,255,0.07);
  border-radius: 16px; padding: 2rem;
  text-decoration: none; color: inherit;
  transition: all 0.35s ease;
  backdrop-filter: blur(10px);
  -webkit-backdrop-filter: blur(10px);
}
.project-card:hover {
  transform: translateY(-4px);
  background: rgba(255,255,255,0.06);
  border-color: rgba(255,255,255,0.14);
  box-shadow: 0 16px 48px rgba(0,0,0,0.3);
}
.project-icon {
  width: 44px; height: 44px; border-radius: 12px;
  display: flex; align-items: center; justify-content: center;
  margin-bottom: 1rem; font-size: 1.2rem;
  background: rgba(59,130,246,0.12);
  border: 1px solid rgba(59,130,246,0.2);
}
.project-card h2 {
  font-size: 1.15rem; font-weight: 700; margin-bottom: 0.4rem;
  color: #f1f5f9;
}
.project-card .desc {
  font-size: 0.9rem; color: #94a3b8; line-height: 1.6;
  margin-bottom: 0.75rem;
}
.project-card .tag {
  display: inline-block;
  font-size: 0.75rem; font-weight: 500;
  padding: 0.2rem 0.6rem; border-radius: 9999px;
  background: rgba(59,130,246,0.1);
  color: #93c5fd;
}
.project-card .arrow {
  display: inline-block; margin-left: 0.25rem;
  transition: transform 0.25s ease;
}
.project-card:hover .arrow { transform: translateX(3px); }

footer {
  margin-top: auto; padding: 2rem;
  text-align: center; color: #475569; font-size: 0.8rem;
  position: relative; z-index: 1;
}
footer a { color: #64748b; text-decoration: none; }
footer a:hover { color: #94a3b8; }

@media (max-width: 480px) {
  header { padding: 4rem 1.25rem 2rem; }
  .projects { padding: 0 1rem 3rem; }
}
</style>
</head>
<body>

<header>
  <h1><span class="gradient-text">YiZhiQvQ</span></h1>
  <p>一些个人项目</p>
</header>

<div class="projects">
  <a href="/scutnetlogin/" class="project-card">
    <div class="project-icon">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#60a5fa" stroke-width="2"><rect x="2" y="3" width="20" height="14" rx="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg>
    </div>
    <h2>SCUTNetLogin <span class="arrow">&rarr;</span></h2>
    <p class="desc">华南理工大学校园有线网认证客户端，一键连接，稳定在线。</p>
    <span class="tag">Qt 6 / C++</span>
  </a>

  <!-- 新项目模板
  <a href="/project-name/" class="project-card">
    <div class="project-icon">...</div>
    <h2>Project Name <span class="arrow">&rarr;</span></h2>
    <p class="desc">简短描述。</p>
    <span class="tag">标签</span>
  </a>
  -->
</div>

<footer>
  <a href="https://github.com/YiZhiQvQ" target="_blank" rel="noopener">GitHub</a>
</footer>

</body>
</html>
